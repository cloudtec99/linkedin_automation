name: 📝 Generate & Send Daily LinkedIn Post

on:
  schedule:
    - cron: '30 4 * * 1-5'  # 10:00 AM IST = 04:30 UTC, Mon–Fri
  workflow_dispatch:          # Manual trigger from GitHub UI anytime

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate post via Groq (Llama 3.1 70B) — FREE
        id: gen
        run: node scripts/generate.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Send Telegram approval message
        run: node scripts/notify.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          POST_CONTENT:       ${{ steps.gen.outputs.post_content }}
          POST_TOPIC:         ${{ steps.gen.outputs.post_topic }}
          POST_ID:            ${{ steps.gen.outputs.post_id }}
